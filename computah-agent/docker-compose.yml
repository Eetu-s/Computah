services:
  # Gemma 4 with its audio encoder, behind an OpenAI-compatible API.
  #
  # llama.cpp — not Ollama. Ollama crashes on Gemma 4 audio and its tool-call
  # parser is broken for this architecture; llama.cpp is the working runtime.
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: computah-llama
    # host networking so the agent (also host-networked, for /dev/snd) can
    # reach it on 127.0.0.1:8080.
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./models:/models
    # Weights are downloaded by hand (see README) rather than with -hf: the
    # auto-download hangs on some builds, and this keeps the image reproducible.
    command: >
      -m /models/gemma-4-E2B-it-Q8_0.gguf
      --mmproj /models/mmproj-gemma-4-E2B-it-Q8_0.gguf
      --jinja
      --host 0.0.0.0 --port 8080
      --ctx-size 8192
      --threads 4
    mem_limit: 6g

  # Mic -> utterance -> Gemma -> tool call -> computah-cast.
  agent:
    build: .
    image: computah-agent:latest
    container_name: computah-agent
    network_mode: host
    restart: unless-stopped
    depends_on:
      - llama
    environment:
      LLAMA_URL: "http://127.0.0.1:8080"
      # computah-cast is host-networked on 8000 (see ../computah-cast).
      CAST_URL: "http://127.0.0.1:8000"
      # The model only acts when it hears this. Set to "" to act on everything.
      WAKE_WORD: "computah"
      # Set to "true" to log the chosen tool without running it (mic tuning).
      DRY_RUN: "false"
      LOG_LEVEL: "INFO"
      # Raise if a noisy room self-triggers; lower if quiet speech is missed.
      # VAD_THRESHOLD: "3.0"
      # Input device index — see: python agent.py --list-devices
      # MIC_DEVICE: "1"
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio
