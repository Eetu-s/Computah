# Two speech-input paths, selected with the COMPOSE_PROFILES env var (see .env):
#   COMPOSE_PROFILES=stt     -> cheap Moonshine STT  (mic + engine)
#   COMPOSE_PROFILES=agent   -> multimodal LLM       (agent + llama)
# Only the selected profile's containers are built and started; the other
# path is not included in the build at all.
services:
  # ── STT path ───────────────────────────────────────────────────────────────
  # Microphone listener: transcribes speech from a USB mic, matches phrases to
  # commands, and POSTs them to the engine. Needs a mic + /dev/snd on a real
  # Linux host (not WSL).
  mic:
    profiles: ["stt"]
    build:
      context: ./STT
      args:
        # "tiny" is bundled/offline. Change to "base" for higher accuracy
        # (downloaded on first run, so needs network once).
        MOONSHINE_MODEL: tiny
    image: computah-moonshine
    container_name: moonshine-mic
    environment:
      MOONSHINE_MODEL: tiny
      OMP_NUM_THREADS: "4"
      # Base URL of the engine's commands; a matched command name is appended.
      ENGINE_URL: "http://computah-engine:9000/commands"
      # Optional: input device index (see `python -m sounddevice`).
      # MOONSHINE_MIC_DEVICE: "1"
    # Guard against runaway memory on a 4GB Pi.
    mem_limit: 2g
    restart: unless-stopped
    # Pass the host sound devices into the container so it can reach the mic.
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio
    depends_on:
      - computah-engine

  # Command executor: runs a named command at POST /commands/<name>.
  # Commands are modular — add one by dropping a module in engine/commands/.
  # Shared infrastructure: runs under both speech paths
  computah-engine:
    profiles: ["stt", "agent"]
    build:
      context: ./engine
    image: computah-engine
    container_name: computah-engine
    environment:
      PORT: "9000"
      COMMANDS_PREFIX: "/commands"
    # Expose to the host too, so you can test with curl from your machine.
    ports:
      - "9000:9000"
    restart: unless-stopped

  # ── Agent path ─────────────────────────────────────────────────────────────
  # Gemma 4 (audio) behind an OpenAI-compatible API, and the agent that drives
  # it. Definitions are reused from ./computah-agent/docker-compose.yml so there
  # is a single source of truth; here we only add the "agent" profile.
  llama:
    extends:
      file: ./computah-agent/docker-compose.yml
      service: llama
    profiles: ["agent"]

  agent:
    extends:
      file: ./computah-agent/docker-compose.yml
      service: agent
    profiles: ["agent"]
    # extends does not carry depends_on across files, so restate it here.
    depends_on:
      - llama
