services:
  # Microphone listener: transcribes speech from a USB mic and POSTs each
  # completed sentence to POST_URL.
  #
  # Requires a mic on the host and a real Linux host (e.g. the Pi). The mic is
  # passed in via /dev/snd; this can't work on WSL (no audio device).
  #   docker compose up -d
  #   docker compose logs -f
  mic:
    build:
      context: ./STT
      args:
        # "tiny" is bundled/offline. Change to "base" for higher accuracy
        # (downloaded on first run, so needs network once).
        MOONSHINE_MODEL: tiny
    image: computah-moonshine
    container_name: moonshine-mic
    environment:
      MOONSHINE_MODEL: tiny
      OMP_NUM_THREADS: "4"
      # Where to send completed sentences (adjust host/port/path to your service).
      POST_URL: "http://computah-engine:9000/processCommand" #TODO PLACEHOLDER
      # Optional: input device index (see `python -m sounddevice`).
      # MOONSHINE_MIC_DEVICE: "1"
    # Guard against runaway memory on a 4GB Pi.
    mem_limit: 2g
    restart: unless-stopped
    # Pass the host sound devices into the container so it can reach the mic.
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio
    depends_on:
      - computah-engine

  # Command executor: runs a named command at POST /commands/<name>.
  # Commands are modular — add one by dropping a module in engine/commands/.
  # First example: turn-on-led (POST /commands/turn-on-led).
  computah-engine:
    build:
      context: ./engine
    image: computah-engine
    container_name: computah-engine
    environment:
      PORT: "9000"
      COMMANDS_PREFIX: "/commands"
    ports:
      - "9000:9000"
    restart: unless-stopped
